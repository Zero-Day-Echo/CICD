# 流水线仅在 CICD 仓库运行。
# 在 CICD 打 tag（如 appbackend-v0616）触发构建；源码固定 checkout AIExamPlatform@main；
# tag 名只用于解析子项目 + docker 镜像版本（appbackend:v0616）。
name: Tag Release (Docker → OSS)

on:
  push:
    tags:
      - "*-v*"

  workflow_dispatch:
    inputs:
      tag:
        description: 镜像标签名，例如 appbackend-v0615
        required: true
        type: string
      monorepo:
        description: 源码 monorepo（owner/name）
        required: false
        default: Zero-Day-Echo/AIExamPlatform
        type: string
      monorepo_ref:
        description: checkout 分支（默认 main）
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      MONOREPO: ${{ github.event_name == 'workflow_dispatch' && inputs.monorepo || 'Zero-Day-Echo/AIExamPlatform' }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.monorepo_ref || 'main' }}
    steps:
      - name: Require GH_SECRET
        run: |
          if [[ -z "${{ secrets.GH_SECRET }}" ]]; then
            echo "::error::请在 CICD 仓库配置 Secret「GH_SECRET」（可读 AIExamPlatform 及子模块的 PAT）。"
            exit 1
          fi

      - name: Validate image tag name
        run: |
          set -euo pipefail
          echo "image_tag=${RELEASE_TAG}"
          echo "checkout ${MONOREPO}@${CHECKOUT_REF}"
          python3 -c '
          import os, re, sys
          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"[a-z0-9][a-z0-9-]*[a-z0-9]-v[0-9A-Za-z.]+", tag):
              print(f"::error::标签「{tag}」格式应为 project-vVERSION，例如 appbackend-v0615")
              sys.exit(1)
          '

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MONOREPO }}
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.GH_SECRET }}
          submodules: recursive
          fetch-depth: 1
          path: monorepo

      - name: Parse image tag
        id: meta
        working-directory: monorepo
        run: |
          TAG="${RELEASE_TAG}"
          PARSED="$(python3 "${GITHUB_WORKSPACE}/monorepo/Builder/scripts/parse_tag.py" "$TAG")"
          echo "$PARSED" | tee /tmp/parsed.json
          python3 -c '
          import json, os
          data = json.load(open("/tmp/parsed.json"))
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
              for key in ("project_key", "version", "image_ref", "context", "dockerfile"):
                  fh.write(f"{key}={data[key]}\n")
          '
          echo "将构建 $(python3 -c 'import json; print(json.load(open("/tmp/parsed.json"))["image_ref"])')（源码 ${MONOREPO}@${CHECKOUT_REF}）"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            -f "${{ github.workspace }}/monorepo/${{ steps.meta.outputs.context }}/${{ steps.meta.outputs.dockerfile }}" \
            -t "${{ steps.meta.outputs.image_ref }}" \
            "${{ github.workspace }}/monorepo/${{ steps.meta.outputs.context }}"

      - name: Export image tarball
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          ARCHIVE="${{ github.workspace }}/dist/${{ steps.meta.outputs.project_key }}-${{ steps.meta.outputs.version }}.tar.gz"
          docker save "${{ steps.meta.outputs.image_ref }}" | gzip -9 > "$ARCHIVE"
          ls -lh "$ARCHIVE"
          echo "archive_path=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Install ossutil
        run: |
          curl -fsSL -o ossutil64 https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil64
          sudo mv ossutil64 /usr/local/bin/ossutil

      - name: Upload to Aliyun OSS
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
        run: |
          MONOREPO_ROOT="${{ github.workspace }}/monorepo"
          "${MONOREPO_ROOT}/Builder/scripts/upload_oss.sh" \
            "$archive_path" \
            "${{ steps.meta.outputs.project_key }}" \
            "${{ steps.meta.outputs.version }}"

      - name: Upload build artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.meta.outputs.project_key }}-${{ steps.meta.outputs.version }}
          path: ${{ env.archive_path }}
          retention-days: 7
