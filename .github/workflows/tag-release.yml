# 流水线仅在 CICD 仓库运行。
# 在 CICD 打 tag（如 appbackend-v061201 或 all-v061201）触发构建；源码固定 checkout AIExamPlatform@main；
# 版本号 v[mmdd][no]：v061201 = 6/12 第 1 次编译。tag 名只用于解析子项目 + docker 镜像版本。
name: Tag Release (Docker → OSS)

on:
  push:
    tags:
      - "*-v*"

  workflow_dispatch:
    inputs:
      tag:
        description: 镜像标签名，例如 appbackend-v061201 或 all-v061201（全量）
        required: true
        type: string
      monorepo:
        description: 源码 monorepo（owner/name）
        required: false
        default: Zero-Day-Echo/AIExamPlatform
        type: string
      monorepo_ref:
        description: checkout 分支（默认 main）
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.meta.outputs.mode }}
      matrix: ${{ steps.meta.outputs.matrix }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      MONOREPO: ${{ github.event_name == 'workflow_dispatch' && inputs.monorepo || 'Zero-Day-Echo/AIExamPlatform' }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.monorepo_ref || 'main' }}
    steps:
      - name: Require GH_SECRET
        run: |
          if [[ -z "${{ secrets.GH_SECRET }}" ]]; then
            echo "::error::请在 CICD 仓库配置 Secret「GH_SECRET」（可读 AIExamPlatform 及子模块的 PAT）。"
            exit 1
          fi

      - name: Validate image tag name
        run: |
          set -euo pipefail
          echo "image_tag=${RELEASE_TAG}"
          echo "checkout ${MONOREPO}@${CHECKOUT_REF}"
          python3 -c '
          import os, re, sys
          tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"all-v[0-9A-Za-z.]+", tag):
              sys.exit(0)
          if re.fullmatch(r"[a-z0-9][a-z0-9-]*[a-z0-9]-v[0-9A-Za-z.]+", tag):
              sys.exit(0)
          print(f"::error::标签「{tag}」格式应为 project-vVERSION 或 all-vVERSION，例如 appbackend-v061201 / all-v061201（版本 v[mmdd][no]）")
          sys.exit(1)
          '

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MONOREPO }}
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.GH_SECRET }}
          submodules: recursive
          fetch-depth: 1
          path: monorepo

      - name: Parse release matrix
        id: meta
        working-directory: monorepo
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          PARSED="$(python3 "${GITHUB_WORKSPACE}/monorepo/Builder/scripts/parse_tag.py" "$TAG")"
          echo "$PARSED" | tee /tmp/parsed.json
          MODE="$(python3 -c 'import json; print(json.load(open("/tmp/parsed.json"))["mode"])')"
          MATRIX="$(python3 "${GITHUB_WORKSPACE}/monorepo/Builder/scripts/parse_release_matrix.py" "$TAG")"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MATRIX" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [[ "$MODE" == "all" ]]; then
            echo "全量构建 ${TAG}，子项目数: $(echo "$MATRIX" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          else
            echo "将构建 $(python3 -c 'import json; print(json.load(open("/tmp/parsed.json"))["image_ref"])')（源码 ${MONOREPO}@${CHECKOUT_REF}）"
          fi

  build-and-upload:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      MONOREPO: ${{ github.event_name == 'workflow_dispatch' && inputs.monorepo || 'Zero-Day-Echo/AIExamPlatform' }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.monorepo_ref || 'main' }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MONOREPO }}
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.GH_SECRET }}
          submodules: recursive
          fetch-depth: 1
          path: monorepo

      - name: Build image (${{ matrix.project_key }})
        run: |
          set -euo pipefail
          DOCKER_BUILD_ARGS=()
          while IFS=$'\t' read -r arg_key arg_val; do
            [[ -n "$arg_key" ]] || continue
            DOCKER_BUILD_ARGS+=(--build-arg "${arg_key}=${arg_val}")
            echo "build-arg ${arg_key}=${arg_val}"
          done < <(
            python3 -c '
          import json, os
          raw = os.environ.get("BUILD_ARGS_JSON", "{}")
          args = json.loads(raw) if raw.strip() else {}
          for k, v in args.items():
              print(f"{k}\t{v}")
          ' 
          )
          docker build \
            "${DOCKER_BUILD_ARGS[@]}" \
            -f "${{ github.workspace }}/monorepo/${{ matrix.context }}/${{ matrix.dockerfile }}" \
            -t "${{ matrix.image_ref }}" \
            "${{ github.workspace }}/monorepo/${{ matrix.context }}"
        env:
          BUILD_ARGS_JSON: ${{ toJson(matrix.build_args) }}

      - name: Export image tarball
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          ARCHIVE="${{ github.workspace }}/dist/${{ matrix.project_key }}-${{ matrix.version }}.tar.gz"
          docker save "${{ matrix.image_ref }}" | gzip -9 > "$ARCHIVE"
          ls -lh "$ARCHIVE"
          echo "archive_path=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Install ossutil
        run: |
          curl -fsSL -o ossutil64 https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil64
          sudo mv ossutil64 /usr/local/bin/ossutil

      - name: Upload to Aliyun OSS
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
          OSS_CLEANUP_OLD: "1"
        run: |
          MONOREPO_ROOT="${{ github.workspace }}/monorepo"
          "${MONOREPO_ROOT}/Builder/scripts/upload_oss.sh" \
            "$archive_path" \
            "${{ matrix.project_key }}" \
            "${{ matrix.version }}"

      - name: Upload build artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.project_key }}-${{ matrix.version }}
          path: ${{ env.archive_path }}
          retention-days: 7
